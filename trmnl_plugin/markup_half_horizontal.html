<!-- Claude Code Dashboard — Half Horizontal (800x240) -->

<div class="layout layout--col">

  <div class="grid grid--cols-6 lg:grid--cols-3">
    <div class="flex flex--col flex--stretch-x">
      <span class="label label--filled lg:label--large">EXTRA</span>
      <span class="value value--small lg:value--xxlarge">${{ extra_spent }}</span>
    </div>
    <div class="flex flex--col flex--stretch-x">
      <span class="label label--small lg:label--large">Month</span>
      <span class="value value--small lg:value--xxlarge">${{ month_cost }}</span>
    </div>
    <div class="flex flex--col flex--stretch-x">
      <span class="label label--small lg:label--large">Session</span>
      <span class="value value--small lg:value--xxlarge">{{ session_pct }}%</span>
    </div>
    <div class="flex flex--col flex--stretch-x">
      <span class="label label--small lg:label--large">Week</span>
      <span class="value value--small lg:value--xxlarge">{{ week_all_pct }}%</span>
    </div>
    <div class="flex flex--col flex--stretch-x">
      <span class="value value--small lg:value--xxlarge">{{ active_now }}</span>
      <span class="label label--small lg:label--large">Running</span>
    </div>
    <div class="flex flex--col flex--stretch-x">
      <span class="value value--small lg:value--xxlarge">{{ cache_pct }}%</span>
      <span class="label label--small lg:label--large">Cache</span>
    </div>
  </div>

</div>

<div class="title_bar">
  <span class="title">Claude &middot; {{ streak }}d streak &middot; {{ today_requests }} reqs &middot; {{ today_tokens }} tok</span>
  <span class="instance">{{ updated_at }}</span>
</div>
